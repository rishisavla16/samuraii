<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMURAIi — Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="index.html" class="site-logo" aria-label="SAMURAIi home">
          <img src="for%20light%20bgs.png" alt="SAMURAIi" />
        </a>
        <div class="header-right">
        <nav class="site-nav" data-nav-panel>
          <div class="nav-item nav-item--dropdown">
            <a href="shop.html" class="nav-link">Shop</a>
            <div class="nav-dropdown" aria-label="Shop categories">
              <a href="chains.html">Chains</a>
              <a href="bracelets.html">Bracelets</a>
              <a href="earrings.html">Earrings</a>
              <a href="rings.html">Rings</a>
              <a href="bandanas.html">Bandanas</a>
              <a href="tote.html">Tote</a>
            </div>
          </div>
          <a href="ourstory.html">Our Story</a>
          <a href="contact.html" class="is-active">Contact</a>
          <a href="favorites.html" class="nav-icon" aria-label="Favorites">
            <img src="assets/icons/heart.svg" alt="" width="22" height="22" />
          </a>
          <a href="profile.html" class="nav-icon" aria-label="Profile">
            <img src="assets/icons/profile.svg" alt="" width="22" height="22" />
          </a>

        </nav>
        <div class="header-actions">
          <button
            class="nav-toggle"
            type="button"
            aria-label="Open menu"
            aria-expanded="false"
            data-nav-toggle
          >
            <span></span><span></span><span></span>
          </button>
          <a href="cart.html" class="nav-icon cart-link" aria-label="Cart">
            <img src="assets/icons/cart.svg" alt="" width="22" height="22" />
            <span class="cart-link__count" data-cart-count hidden>0</span>
          </a>
        </div>
        </div>
      </div>
    </header>

    <main class="page reveal">
      <div class="container">
        <header class="page-header">
          <h1>Contact us</h1>
        </header>

        <div class="contact-layout">
          <div class="contact-map reveal">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d241317.11609817257!2d72.74109894936541!3d19.08219783958241!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c6306644edc1%3A0x5da4ed8f8d648caf!2sMumbai%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1716566400000!5m2!1sen!2sin"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="SAMURAIi location on Google Maps"
            ></iframe>
          </div>

          <form class="contact-form reveal" data-contact-form novalidate>
            <label>
              Name
              <input type="text" name="name" required autocomplete="name" />
            </label>
            <label>
              Email
              <input type="email" name="email" required autocomplete="email" />
            </label>
            <label>
              Message
              <textarea name="message" rows="5" required></textarea>
            </label>
            <button type="submit" class="btn btn--solid">Send message</button>
            <p class="form-notice" data-form-notice hidden></p>
          </form>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__grid">
        <div class="site-footer__col site-footer__socials">
          <p class="site-footer__eyebrow">Connect</p>
          <ul class="site-footer__icon-list" aria-label="Social media">
            <li>
              <a
                href="https://www.instagram.com/samuraii.india/"
                class="site-footer__icon"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Instagram"
              >
                <img src="assets/icons/social/instagram.svg" alt="" width="20" height="20" />
              </a>
            </li>
            <li>
              <a href="#" class="site-footer__icon" aria-label="Email">
                <img src="assets/icons/social/email.svg" alt="" width="20" height="20" />
              </a>
            </li>
            <li>
              <a
                href="#"
                class="site-footer__icon"
                aria-label="WhatsApp"
              >
                <img src="assets/icons/social/whatsapp.svg" alt="" width="20" height="20" />
              </a>
            </li>
          </ul>
        </div>

        <div class="site-footer__col site-footer__location">
          <p class="site-footer__eyebrow">Location</p>
          <address class="site-footer__address">
            <span>Mumbai, Maharashtra</span>
            <span>India</span>
          </address>
          <a class="site-footer__email" href="#">hello@samuraii.com</a>
        </div>

        <div class="site-footer__col site-footer__legal">
          <nav class="site-footer__legal-links" aria-label="Legal">
            <a href="faq.html">FAQs</a>
            <a href="terms.html">Terms</a>
            <a href="refunds.html">Refunds</a>
            <a href="cancellations.html">Cancellations</a>
          </nav>
        </div>
      </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
