<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMURAIi — About</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="index.html" class="site-logo" aria-label="SAMURAIi home">
          <img src="for%20dark%20bgs.png" alt="SAMURAIi" />
        </a>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          data-nav-toggle
        >
          <span></span><span></span><span></span>
        </button>
        <nav class="site-nav" data-nav-panel>
          <a href="shop.html">Shop</a>
          <a href="about.html" class="is-active">About</a>
          <a href="contact.html">Contact</a>
          <a href="profile.html" class="nav-icon" aria-label="Profile">
            <img src="assets/icons/profile.svg" alt="" width="22" height="22" />
          </a>
          <a href="cart.html" class="nav-icon cart-link" aria-label="Cart">
            <img src="assets/icons/cart.svg" alt="" width="22" height="22" />
            <span class="cart-link__count" data-cart-count hidden>0</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="page reveal">
      <div class="container">
        <header class="page-header">
          <h1>About us</h1>
        </header>

        <div class="about-split reveal">
          <div class="about-split__media">
            <img src="logo.jpg" alt="SAMURAIi" loading="lazy" />
          </div>
          <div class="about-split__text">
            <p>
              We believe what you wear should feel like you.<br />
              Samuraii is designed for the fearless, the<br />
              evolving and the self-made.<br />
              From accessories to lifestyle - we're building a<br />
              tribe that moves with purpose.
            </p>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <p>&copy; 2026 SAMURAIi</p>
        <div class="site-footer__links">
          <a href="shop.html">Shop</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
